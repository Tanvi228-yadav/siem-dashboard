version: '3.8'
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.13
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - node.name=es01
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.13
    container_name: logstash
    restart: unless-stopped
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5000:5000"
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.13
    container_name: kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  web:
    build: .
    container_name: siem-web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ES_HOST=http://elasticsearch:9200
      - SECRET_KEY=supersecretkey
      - SIEM_USERS=admin:adminpass:admin;analyst:analystpass:analyst
    depends_on:
      - elasticsearch
    command: ["gunicorn", "-b", "0.0.0.0:5000", "--workers", "3", "app:app"]

  alerter:
    build: .
    container_name: siem-alerter
    restart: unless-stopped
    command: ["python", "scripts/alerts.py"]
    environment:
      - ES_HOST=http://elasticsearch:9200
      - ALERT_SEVERITY=HIGH
      - POLL_INTERVAL=30
      - SLACK_WEBHOOK_URL=
      - ALERT_EMAIL=
      - SMTP_HOST=localhost
      - SMTP_PORT=25
      - SMTP_USER=
      - SMTP_PASS=
    depends_on:
      - elasticsearch

  generator:
    build: .
    container_name: siem-generator
    restart: on-failure
    command: ["python", "scripts/generate_logs.py"]
    environment:
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5000
      - EVENT_RATE=1.0
    depends_on:
      - logstash

volumes:
  esdata:
