input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  date { match => [ "timestamp", "ISO8601" ] target => "@timestamp" }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "siem-%{+YYYY.MM.dd}"
    ilm_enabled => false
  }
  stdout { codec => rubydebug }
}
